<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="petGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7c23;stop-opacity:1" />
    </linearGradient>
    <pattern id="petPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="url(#petGrad)"/>
      <circle cx="20" cy="20" r="15" fill="rgba(255,255,255,0.08)"/>
      <circle cx="0" cy="0" r="15" fill="rgba(255,255,255,0.05)"/>
      <circle cx="40" cy="40" r="15" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#petPattern)"/>
  <rect x="20" y="20" width="560" height="360" rx="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="300" y="185" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">PET Acoustic Panel</text>
  <text x="300" y="225" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">100% Recycled Polyester Fiber</text>
  <text x="300" y="255" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">NRC &gt; 0.8 | Eco-Friendly</text>
  <circle cx="300" cy="310" r="25" fill="rgba(255,255,255,0.15)"/>
  <text x="300" y="316" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🔇</text>
</svg>
