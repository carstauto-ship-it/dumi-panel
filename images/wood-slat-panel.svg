<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A2B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D3A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="feltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3009;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#f5f0e8"/>
  <!-- Wood slats -->
  <g>
    <rect x="20" y="40" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
    <rect x="20" y="62" width="560" height="18" rx="3" fill="#7a4f26"/>
    <rect x="20" y="84" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
    <rect x="20" y="106" width="560" height="18" rx="3" fill="#7a4f26"/>
    <rect x="20" y="128" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
    <rect x="20" y="150" width="560" height="18" rx="3" fill="#7a4f26"/>
    <rect x="20" y="172" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
    <rect x="20" y="194" width="560" height="18" rx="3" fill="#7a4f26"/>
    <rect x="20" y="216" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
    <rect x="20" y="238" width="560" height="18" rx="3" fill="#7a4f26"/>
    <rect x="20" y="260" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
    <rect x="20" y="282" width="560" height="18" rx="3" fill="#7a4f26"/>
    <rect x="20" y="304" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
    <rect x="20" y="326" width="560" height="18" rx="3" fill="#7a4f26"/>
    <rect x="20" y="348" width="560" height="18" rx="3" fill="url(#woodGrad)"/>
  </g>
  <!-- Dark felt background -->
  <rect x="20" y="20" width="560" height="360" rx="12" fill="none" stroke="url(#feltGrad)" stroke-width="20"/>
  <rect x="20" y="20" width="560" height="360" rx="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="300" y="385" font-family="Arial, sans-serif" font-size="16" fill="#8B5A2B" text-anchor="middle" font-weight="bold">Wood Slat Acoustic Panel (Akupanel)</text>
</svg>
