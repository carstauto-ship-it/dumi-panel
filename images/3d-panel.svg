<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="grad3d1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <pattern id="wavePattern" x="0" y="0" width="80" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30 Q20 10 40 30 Q60 50 80 30" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="8"/>
      <path d="M0 50 Q20 30 40 50 Q60 70 80 50" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="6"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grad3d1)"/>
  <rect width="600" height="400" fill="url(#wavePattern)"/>
  <!-- 3D Box effect -->
  <g transform="translate(300,200)">
    <!-- shadow -->
    <polygon points="0,120 180,60 180,-60 0,0" fill="rgba(0,0,0,0.3)"/>
    <!-- right face -->
    <polygon points="0,0 180,60 180,-60 0,-120" fill="rgba(255,255,255,0.05)"/>
    <!-- left face -->
    <polygon points="0,0 -180,60 -180,-60 0,-120" fill="rgba(255,255,255,0.1)"/>
    <!-- top face -->
    <polygon points="0,-120 180,-60 0,0 -180,-60" fill="rgba(255,255,255,0.15)"/>
  </g>
  <rect x="20" y="20" width="560" height="360" rx="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="300" y="55" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">3D Acoustic Wall Panel</text>
  <text x="300" y="82" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Enhanced Sound Diffusion &amp; Absorption</text>
</svg>
