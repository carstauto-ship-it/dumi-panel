<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#e8e4dc"/>
  <!-- Ceiling grid pattern -->
  <g stroke="#ccc" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="600" y2="0"/>
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="0" x2="0" y2="400"/>
    <line x1="75" y1="0" x2="75" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="225" y1="0" x2="225" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="375" y1="0" x2="375" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="525" y1="0" x2="525" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>
  <!-- Ceiling tiles -->
  <rect x="2" y="52" width="71" height="46" rx="2" fill="#f8f6f2" stroke="#ddd"/>
  <rect x="77" y="52" width="71" height="46" rx="2" fill="#f8f6f2" stroke="#ddd"/>
  <rect x="152" y="52" width="71" height="46" rx="2" fill="url(#ceilingGrad)" stroke="#ccc"/>
  <rect x="227" y="52" width="71" height="46" rx="2" fill="#f8f6f2" stroke="#ddd"/>
  <rect x="302" y="52" width="71" height="46" rx="2" fill="#f8f6f2" stroke="#ddd"/>
  <rect x="377" y="52" width="71" height="46" rx="2" fill="url(#ceilingGrad)" stroke="#ccc"/>
  <rect x="452" y="52" width="71" height="46" rx="2" fill="#f8f6f2" stroke="#ddd"/>
  <rect x="527" y="52" width="71" height="46" rx="2" fill="#f8f6f2" stroke="#ddd"/>
  <defs>
    <linearGradient id="ceilingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c8b8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c0b4a0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="596" height="396" rx="12" fill="none" stroke="#bbb" stroke-width="2"/>
  <text x="300" y="200" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#555" text-anchor="middle">Acoustic Ceiling Panel</text>
  <text x="300" y="230" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Suspended Ceiling System</text>
  <text x="300" y="380" font-family="Arial, sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Drop Ceiling Tiles | Sound Absorption</text>
</svg>
